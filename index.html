<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecha Camaleón HTML5</title>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'matter', // Usamos Matter.js porque tiene excelente física de cuerdas/restricciones
        matter: { gravity: { y: 1 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let camaleon;
let lengua = null;
let plataformas;

function preload() {
    // Aquí puedes cargar tus propias imágenes. Usaremos formas geométricas por ahora.
}

function create() {
    // 1. Crear el fondo y plataformas donde engancharse
    plataformas = this.matter.world.nextGroup();
    
    // Creamos algunos bloques flotantes (estáticos)
    const bloque1 = this.matter.add.rectangle(400, 150, 80, 40, { isStatic: true });
    const bloque2 = this.matter.add.rectangle(200, 250, 80, 40, { isStatic: true });
    const bloque3 = this.matter.add.rectangle(600, 250, 80, 40, { isStatic: true });

    // Dibujamos visualmente los bloques
    this.add.rectangle(400, 150, 80, 40, 0x55ff55);
    this.add.rectangle(200, 250, 80, 40, 0x55ff55);
    this.add.rectangle(600, 250, 80, 40, 0x55ff55);

    // 2. Crear al Camaleón (un círculo con física)
    camaleon = this.matter.add.circle(400, 400, 20, { frictionAir: 0.01, density: 0.005 });
    this.add.circle(400, 400, 20, { fillStyle: { color: 0xff5555 } }); // Representación visual temporal

    // 3. Detectar el clic/toque de la pantalla
    this.input.on('pointerdown', function (pointer) {
        // Buscamos si el clic fue cerca de una plataforma (simplificado para el ejemplo)
        // En un juego completo, calcularías el bloque más cercano en la dirección del clic.
        let puntoEnganche = buscarBloqueCercano(pointer.x, pointer.y);
        
        if (puntoEnganche) {
            // Si ya había lengua, la destruimos
            if (lengua) this.matter.world.removeConstraint(lengua);

            // Creamos el enganche (mecanismo de Mecha Camaleón)
            lengua = this.matter.add.constraint(camaleon, puntoEnganche, 0, 0.2, {
                render: { strokeStyle: '#ff0055', lineWidth: 4 }
            });
        }
    }, this);

    this.input.on('pointerup', function () {
        // Al soltar el clic, el camaleón se suelta de la plataforma
        if (lengua) {
            this.matter.world.removeConstraint(lengua);
            lengua = null;
        }
    }, this);
}

function update() {
    // Aquí puedes mover la cámara para que siga al camaleón a lo largo del mapa
    // O añadir controles de movimiento horizontal extra (A y D o flechas)
}

function buscarBloqueCercano(x, y) {
    // Lógica simple: si haces clic en la mitad superior, te enganchas al bloque más cercano
    if (y < 300) {
        if (x < 300) return { x: 200, y: 250 };
        if (x > 500) return { x: 600, y: 250 };
        return { x: 400, y: 150 };
    }
    return null;
}
</script>

</body>
</html>
